<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    :root {
      --bg: #f4f7ff;
      --card: #ffffff;
      --primary: #4f46e5;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 100%);
      display: grid;
      place-items: center;
      color: var(--text);
    }

    .auth-shell {
      width: min(100%, 960px);
      padding: 1.5rem;
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 24px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      min-height: 520px;
    }

    .auth-panel {
      padding: 3rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.5rem;
    }

    .auth-sidebar {
      background: linear-gradient(180deg, #4f46e5 0%, #6366f1 100%);
      color: #fff;
      padding: 3rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1rem;
    }

    .auth-sidebar h2 {
      margin: 0;
      font-size: clamp(2rem, 2.5vw, 2.5rem);
      line-height: 1.05;
    }

    .auth-sidebar p {
      margin: 0;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.8;
    }

    .form-group {
      display: grid;
      gap: 1rem;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      font-size: 0.95rem;
      color: var(--muted);
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #f8fafc;
      padding: 0.95rem 1rem;
      font-size: 1rem;
      color: var(--text);
    }

    input:focus {
      outline: none;
      border-color: rgba(79, 70, 229, 0.5);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
      background: #fff;
    }

    .submit-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .submit-row button {
      border: none;
      border-radius: 16px;
      padding: 0.95rem 1.45rem;
      font-size: 1rem;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .submit-row button:hover {
      transform: translateY(-1px);
      background: #4338ca;
    }

    .message {
      font-size: 0.95rem;
      color: #f43f5e;
      min-height: 1.25rem;
    }

    .form-link {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .form-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .form-link a:hover {
      text-decoration: underline;
    }

    .auth-footer {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.75);
    }

    @media (max-width: 840px) {
      .auth-card {
        grid-template-columns: 1fr;
      }

      .auth-sidebar {
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <section class="auth-sidebar">
        <div>
          <h2>Welcome back!</h2>
          <p>Sign in to continue to your account with a secure and user-friendly login flow.</p>
        </div>
        <div class="auth-footer">
          <p>If you don’t have an account yet, you can register on the next page.</p>
        </div>
      </section>

      <section class="auth-panel">
        <form class="form-group" method="post" action="/login" novalidate>
          <div>
            <h3>Login</h3>
            <p>Enter your email and password to sign in.</p>
          </div>

          <label for="loginEmail">
            Email
            <input id="loginEmail" name="email" type="email" placeholder="you@example.com" required />
          </label>

          <label for="loginPassword">
            Password
            <input id="loginPassword" name="password" type="password" placeholder="••••••••" required minlength="6" />
          </label>

          <div class="message" id="loginMessage"></div>

          <div class="submit-row">
            <button type="submit">Sign in</button>
          </div>

          <p class="form-link">
            New here? <a href="/register">Create an account</a>
          </p>
        </form>
      </section>
    </div>
  </div>

  <script>
    const loginForm = document.querySelector('form');
    const loginMessage = document.getElementById('loginMessage');

    loginForm.addEventListener('submit', (event) => {
      if (!loginForm.checkValidity()) {
        event.preventDefault();
        loginMessage.textContent = 'Please complete both email and password fields.';
      }
    });
  </script>
</body>
</html>
